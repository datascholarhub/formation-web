<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" integrity="sha384-tViUnnbYAV00FLIhhi3v/dWt3Jxw4gZQcNoSCxCIFNJVCx7/D55/wXsrNIRANwdD" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    <title>Luxe Shop</title>
</head>
<body>
    <header>
        <div>
            <i class="bi bi-list"></i>
            <h1 class="logo">Luxe Shop</h1>
            <i class="bi bi-bag"></i>
        </div>
    </header>

    <main>
        <section class="hero">
            <div>
                <img src="images/shoe.png" alt="Chaussure noire à semelle blanche">
            </div>
            <div>
                <p class="text-label">Nouvelle collection 2024</p>
                <h2>L'Élégance Redéfinie pour votre <span class="text-blue">Quotidien</span>.</h2>
                <p>Découvrez une sélection exclusive de pièces intemporelles alliant artisanat <span class="text-italic">traditionnel</span> et design contemporain. Élevez votre style avec Luxe Shop.</p>
                <button class="btn-primary">Découvrir le Catalogue</button>
                <button class="btn-secondary">Voir les tendances</button>
            </div>
        </section>
    </main>

    <footer>

        <p><a href="#">Retour en haut</a></p>

    </footer>
</body>
</html>

<!--
- Bootstrap Icons pour les icones
- Google Fonts pour les polices
- ol pour les listes numérotées
- a (mailto, chemin d'un fichier, attribut download pour forcer le téléchargement, target="_blank")
-->
